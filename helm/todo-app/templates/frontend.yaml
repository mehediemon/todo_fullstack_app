apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-frontend
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.frontend.replicas }}

  selector:
    matchLabels:
      app: todo-frontend

  template:
    metadata:
      labels:
        app: todo-frontend

    spec:
      containers:
        - name: frontend

          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"

          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.frontend.port }}

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf

          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}

            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}

            initialDelaySeconds: 20
            periodSeconds: 20

          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}

      volumes:
        - name: nginx-config
          configMap:
            name: todo-config

            items:
              - key: nginx.conf
                path: nginx.conf

---
apiVersion: v1
kind: Service

metadata:
  name: todo-frontend
  namespace: {{ .Values.namespace }}

spec:
  type: ClusterIP

  selector:
    app: todo-frontend

  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.frontend.port }}