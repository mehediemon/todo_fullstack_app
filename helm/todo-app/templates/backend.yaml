apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-backend
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.backend.replicas }}

  selector:
    matchLabels:
      app: todo-backend

  template:
    metadata:
      labels:
        app: todo-backend

    spec:
      containers:
        - name: backend

          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"

          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.backend.port }}

          envFrom:
            - secretRef:
                name: todo-secret

            - configMapRef:
                name: todo-config

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}

            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}

            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          resources:
{{ toYaml .Values.backend.resources | indent 12 }}

---
apiVersion: v1
kind: Service

metadata:
  name: todo-backend
  namespace: {{ .Values.namespace }}

spec:
  type: ClusterIP

  selector:
    app: todo-backend

  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}