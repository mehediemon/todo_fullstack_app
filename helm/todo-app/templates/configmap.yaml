apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-config
  namespace: {{ .Values.namespace }}
data:
  FRONTEND_ORIGIN: {{ ternary (printf "http%s://%s" (ternary "s" "" .Values.ingress.tls.enabled) .Values.ingress.host) "*" (ne .Values.ingress.host "") | quote }}
  VITE_API_URL: {{ .Values.frontend.apiUrl | quote }}
  nginx.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://todo-backend:{{ .Values.backend.port }}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        try_files $uri /index.html;
      }
    }
