name: Build Push and GitOps Deploy

on:
  push:
    branches:
      - main

    paths-ignore:
      - 'helm/**'

env:
  FRONTEND_IMAGE: todo-frontend
  BACKEND_IMAGE: todo-backend

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FRONTEND BUILD
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest

      # BACKEND BUILD
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest

      # UPDATE HELM VALUES
      - name: Update Helm Values
        run: |

          sed -i '/frontend:/,/tag:/s/tag:.*/tag: "'"${GITHUB_SHA}"'"/' helm/todo-app/values.yaml

          sed -i '/backend:/,/tag:/s/tag:.*/tag: "'"${GITHUB_SHA}"'"/' helm/todo-app/values.yaml

      # COMMIT CHANGES
      - name: Commit Updated Values
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add helm/todo-app/values.yaml

          git commit -m "Update image tags to ${GITHUB_SHA}" || echo "No changes"

          git push