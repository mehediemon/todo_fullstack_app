apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: todo-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mehediemon/todo_fullstack_app.git
    targetRevision: main
    path: helm/todo-app

  destination:
    server: https://kubernetes.default.svc
    namespace: todo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true